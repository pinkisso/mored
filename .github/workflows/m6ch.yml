name: m6ch action

on:
  schedule:
    - cron: '28 */1 * * *'
  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    
      - uses: actions/checkout@v3

      - name: config
        run: |
          git config --global user.email "<>"
          git config --global user.name "m6ch bot"
      
      - name: updating m6ch
        run: python3 res/26-1/m6ch.py > res/26-1/m6ch.m3u8
        
      - name: git add
        run: |
          git add -A
          ls -la 
          
      - name: commit & push
        run: |
          git pull origin main
          git commit -m "m6ch updated"
          git push origin main
        continue-on-error: true
