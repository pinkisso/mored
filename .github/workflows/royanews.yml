name: royanews

on:
  schedule:
    - cron: '00 */05 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: config
        run: |
          git config --global user.email "<>"
          git config --global user.name "royanews bot"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python3 -m pip install requests

      - name: Execute Python script
        run: python3 res/26-1/royanews.py

      - name: Verify generated files
        run: |
          ls -la res/26-1/
          cat res/26-1/royanews.m3u8 || true
          cat res/26-1/roya.m3u8 || true

      - name: git add
        run: |
          git add -A
          ls -la

      - name: commit & push
        run: |
          git pull origin main
          git commit -m "royanews & roya updated" || echo "No changes to commit"
          git push origin main
