name: frolgar2 action

on:
  schedule:
    - cron: '18 */3 * * *'
  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    
      - uses: actions/checkout@v3

      - name: config
        run: |
          git config --global user.email "<>"
          git config --global user.name "frolgar2 bot"
      
      - name: updating frolgar2
        run: python3 res/26-1/frolgar2.py > res/26-1/frolgar2.m3u8
        
      - name: git add
        run: |
          git add -A
          ls -la 
          
      - name: commit & push
        run: |
          git pull origin main
          git commit -m "frolgar2 updated"
          git push origin main
